openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Idol Merch Shop API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: products
    description: Product management
  - name: orders
    description: Order management
  - name: shipping
    description: Shipping schedule management
  - name: members
    description: Membership management
  - name: rewards
    description: Reward/gift exchange
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: available
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{id}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get product by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
        "404":
          description: Not found
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"
    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete product (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /orders:
    get:
      operationId: listOrders
      tags: [orders]
      summary: List all orders
      parameters:
        - name: memberId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Order"
    post:
      operationId: createOrder
      tags: [orders]
      summary: Create a new order (pre-order or pickup)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrderBody"
      responses:
        "201":
          description: Order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/{id}:
    get:
      operationId: getOrder
      tags: [orders]
      summary: Get order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Order details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"
        "404":
          description: Not found
    patch:
      operationId: updateOrder
      tags: [orders]
      summary: Update order status (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrderBody"
      responses:
        "200":
          description: Order updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Order"

  /orders/summary:
    get:
      operationId: getOrderSummary
      tags: [orders]
      summary: Get order stats summary (admin dashboard)
      responses:
        "200":
          description: Order summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderSummary"

  /shipping:
    get:
      operationId: listShippingUpdates
      tags: [shipping]
      summary: List shipping schedule updates
      responses:
        "200":
          description: Shipping updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ShippingUpdate"
    post:
      operationId: createShippingUpdate
      tags: [shipping]
      summary: Create shipping update (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShippingUpdateBody"
      responses:
        "201":
          description: Shipping update created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingUpdate"

  /shipping/{id}:
    patch:
      operationId: updateShippingUpdate
      tags: [shipping]
      summary: Update shipping update (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShippingUpdateBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShippingUpdate"
    delete:
      operationId: deleteShippingUpdate
      tags: [shipping]
      summary: Delete shipping update (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /members:
    get:
      operationId: listMembers
      tags: [members]
      summary: List all members (admin)
      responses:
        "200":
          description: Members list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Member"
    post:
      operationId: createMember
      tags: [members]
      summary: Register a new member (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemberBody"
      responses:
        "201":
          description: Member created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/{id}:
    get:
      operationId: getMember
      tags: [members]
      summary: Get member by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Member details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found
    patch:
      operationId: updateMember
      tags: [members]
      summary: Update member (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /members/lookup:
    get:
      operationId: lookupMember
      tags: [members]
      summary: Look up member by phone number
      parameters:
        - name: phone
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Member found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"
        "404":
          description: Not found

  /members/{id}/add-points:
    post:
      operationId: addPoints
      tags: [members]
      summary: Add points to a member
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPointsBody"
      responses:
        "200":
          description: Points added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Member"

  /rewards:
    get:
      operationId: listRewards
      tags: [rewards]
      summary: List available rewards
      responses:
        "200":
          description: Rewards list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reward"
    post:
      operationId: createReward
      tags: [rewards]
      summary: Create reward (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRewardBody"
      responses:
        "201":
          description: Reward created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reward"

  /rewards/{id}:
    delete:
      operationId: deleteReward
      tags: [rewards]
      summary: Delete reward (admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rewards/redeem:
    post:
      operationId: redeemReward
      tags: [rewards]
      summary: Redeem a reward using points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemRewardBody"
      responses:
        "200":
          description: Redemption successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedemptionResult"
        "400":
          description: Insufficient points or invalid

  /redemptions:
    get:
      operationId: listRedemptions
      tags: [rewards]
      summary: List redemption history
      parameters:
        - name: memberId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Redemption history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Redemption"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        category:
          type: string
        stock:
          type: integer
        isAvailable:
          type: boolean
        isSoldOut:
          type: boolean
        orderType:
          type: string
          description: "preorder or pickup"
        createdAt:
          type: string
          format: date-time
      required: [id, name, price, category, stock, isAvailable, isSoldOut, orderType, createdAt]

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        category:
          type: string
        stock:
          type: integer
        isAvailable:
          type: boolean
        orderType:
          type: string
      required: [name, price, category, stock, isAvailable, orderType]

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        category:
          type: string
        stock:
          type: integer
        isAvailable:
          type: boolean
        isSoldOut:
          type: boolean
        orderType:
          type: string

    Order:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: ["integer", "null"]
        memberName:
          type: string
        memberPhone:
          type: string
        items:
          type: string
          description: JSON string of order items
        totalAmount:
          type: number
        status:
          type: string
          description: "pending, confirmed, shipped, delivered, cancelled"
        orderType:
          type: string
          description: "preorder or pickup"
        notes:
          type: ["string", "null"]
        pointsEarned:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, memberName, memberPhone, items, totalAmount, status, orderType, pointsEarned, createdAt, updatedAt]

    CreateOrderBody:
      type: object
      properties:
        memberId:
          type: ["integer", "null"]
        memberName:
          type: string
        memberPhone:
          type: string
        items:
          type: string
        totalAmount:
          type: number
        orderType:
          type: string
        notes:
          type: ["string", "null"]
      required: [memberName, memberPhone, items, totalAmount, orderType]

    UpdateOrderBody:
      type: object
      properties:
        status:
          type: string
        notes:
          type: ["string", "null"]

    OrderSummary:
      type: object
      properties:
        totalOrders:
          type: integer
        pendingOrders:
          type: integer
        shippedOrders:
          type: integer
        deliveredOrders:
          type: integer
        totalRevenue:
          type: number
        totalMembers:
          type: integer
      required: [totalOrders, pendingOrders, shippedOrders, deliveredOrders, totalRevenue, totalMembers]

    ShippingUpdate:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        status:
          type: string
          description: "preparing, in_transit, arrived, delivered"
        estimatedDate:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, title, description, status, createdAt, updatedAt]

    CreateShippingUpdateBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        estimatedDate:
          type: ["string", "null"]
      required: [title, description, status]

    UpdateShippingUpdateBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        status:
          type: string
        estimatedDate:
          type: ["string", "null"]

    Member:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        points:
          type: integer
        tier:
          type: string
          description: "bronze, silver, gold, platinum"
        joinedAt:
          type: string
          format: date-time
        notes:
          type: ["string", "null"]
      required: [id, name, phone, points, tier, joinedAt]

    CreateMemberBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
      required: [name, phone]

    UpdateMemberBody:
      type: object
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        points:
          type: integer
        tier:
          type: string
        notes:
          type: ["string", "null"]

    AddPointsBody:
      type: object
      properties:
        points:
          type: integer
        reason:
          type: ["string", "null"]
      required: [points]

    Reward:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        pointsCost:
          type: integer
        imageUrl:
          type: ["string", "null"]
        stock:
          type: integer
        isAvailable:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, name, pointsCost, stock, isAvailable, createdAt]

    CreateRewardBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        pointsCost:
          type: integer
        imageUrl:
          type: ["string", "null"]
        stock:
          type: integer
        isAvailable:
          type: boolean
      required: [name, pointsCost, stock, isAvailable]

    RedeemRewardBody:
      type: object
      properties:
        memberId:
          type: integer
        rewardId:
          type: integer
      required: [memberId, rewardId]

    RedemptionResult:
      type: object
      properties:
        success:
          type: boolean
        remainingPoints:
          type: integer
        redemptionId:
          type: integer
      required: [success, remainingPoints, redemptionId]

    Redemption:
      type: object
      properties:
        id:
          type: integer
        memberId:
          type: integer
        memberName:
          type: string
        rewardId:
          type: integer
        rewardName:
          type: string
        pointsUsed:
          type: integer
        createdAt:
          type: string
          format: date-time
      required: [id, memberId, memberName, rewardId, rewardName, pointsUsed, createdAt]
