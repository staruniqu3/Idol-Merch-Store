[variables]
COREPACK_INTEGRITY_KEYS = "0"
NODE_VERSION = "22"

[phases.install]
cmds = [
  "corepack enable && corepack prepare pnpm@10.26.1 --activate && pnpm install --no-frozen-lockfile"
]

[phases.build]
cmds = ["pnpm --filter @workspace/api-server run build"]

[start]
cmd = "pnpm --filter @workspace/db run push-force && pnpm --filter @workspace/api-server run start"
